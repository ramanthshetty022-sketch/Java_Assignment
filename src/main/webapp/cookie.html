<!--
7b. Construct a Cookie Management program using JSP to get the fields Name, Domain and Max Expiry Age ( in sec) and press the button Add Cookie for displaying the set cookie information.
Then it has to go to show the active cookie list when you press the link go to the active cookie list
-->
<!-- File: cookie.html -->
<!DOCTYPE html>
<html>
<head>
<meta charset="ISO-8859-1">
<title>Cookie Start</title>
</head>
<body>

<form action="addcookie.jsp" method="post">
    Enter Cookie Name :
    <input type="text" name="cname" required><br/>
    Enter Domain :
    <input type="text" name="cdomain" required><br/>
    Enter Max Expiry Age (in sec) :
    <input type="number" name="cage" required><br/>
    <input type="submit" value="Add Cookie"><br/>
</form>

</body>
</html>
